name: Run Dork Parser Bot

on:
  workflow_dispatch:      # Manual trigger from Actions tab
  schedule:
    - cron: '0 */6 * * *' # Run every 6 hours (optional, adjust as needed)

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # Maximum 6 hours (GitHub limit)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Create .env file from secrets
        run: |
          cat << EOF > .env
          BOT_TOKEN=${{ secrets.BOT_TOKEN }}
          N_CHUNKS=${{ secrets.N_CHUNKS }}
          WORKERS_PER_CHUNK=${{ secrets.WORKERS_PER_CHUNK }}
          MIN_DELAY=${{ secrets.MIN_DELAY }}
          MAX_DELAY=${{ secrets.MAX_DELAY }}
          MAX_RESULTS=${{ secrets.MAX_RESULTS }}
          PROXY_ENABLED=${{ secrets.PROXY_ENABLED }}
          PROXY_LIST=${{ secrets.PROXY_LIST }}
          TOR_PROXY=${{ secrets.TOR_PROXY }}
          DEBUG_HTML=${{ secrets.DEBUG_HTML }}
          EOF

      - name: Run Telegram Bot
        run: python bot-1.py
